          application/json:
            schema:
              type: object
              required: [practitionerId, role]
              properties:
                practitionerId: { type: string }
                role: { type: string, description: 'doctor, nurse, pharmacist, etc.' }
                organizationName: { type: string }
                specialty:
                  type: array
                  items: { type: string }
                locationName: { type: string }
                phone: { type: string }
                email: { type: string, format: email }
                availableDays:
                  type: array
                  items: { type: string, enum: [mon, tue, wed, thu, fri, sat, sun] }
                availableStartTime: { type: string, pattern: '^\d{2}:\d{2}:\d{2}$' }
                availableEndTime: { type: string, pattern: '^\d{2}:\d{2}:\d{2}$' }
      responses:
