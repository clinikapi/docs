  # =========================================================================
  # Bulk Operations
  # =========================================================================
  /v1/bulk/export:
    post:
      summary: Start bulk export
      operationId: bulkExport
      tags: [Bulk]
      description: Export tenant data as NDJSON. Returns a job ID for status polling. Rate limited to 5 operations per hour.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resourceTypes]
              properties:
                resourceTypes:
                  type: array
                  items:
                    type: string
                  description: FHIR resource types to export (e.g. Patient, Encounter, Observation)
                since:
                  type: string
                  format: date-time
                  description: Only export resources modified after this date
      responses:
        '202':
          description: Export job started
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      jobId:
                        type: string
                      status:
                        type: string
                      message:
                        type: string

  /v1/bulk/import:
    post:
      summary: Start bulk import
      operationId: bulkImport
      tags: [Bulk]
      description: Import NDJSON data. Max 10,000 records per batch. Tenant tags are injected automatically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resourceType, data]
              properties:
                resourceType:
                  type: string
                  description: FHIR resource type (e.g. Patient, Observation)
                data:
                  type: string
                  description: NDJSON content (one JSON resource per line)
                  maxLength: 104857600
      responses:
        '202':
          description: Import job started

  /v1/bulk/jobs/{jobId}:
    get:
      summary: Get bulk job status
      operationId: getBulkJobStatus
      tags: [Bulk]
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                        enum: [import, export]
                      status:
                        type: string
                        enum: [pending, processing, completed, failed]
                      totalRecords:
                        type: integer
                      processedRecords:
                        type: integer
                      downloadUrl:
                        type: string
                        description: Pre-signed S3 URL (export only, valid for 1 hour)
                      errors:
                        type: array
                        items:
                          type: string

  # =========================================================================
  # FHIR Passthrough
  # =========================================================================
  /v1/fhir/{path}:
    get:
      summary: Raw FHIR read/search
      operationId: fhirGet
      tags: [FHIR Passthrough]
      description: Direct FHIR R4 read or search with automatic tenant isolation. Tenant tag filter is appended to all searches.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: FHIR path (e.g. Patient/123, Observation?code=8867-4)
      responses:
        '200':
          description: FHIR resource or Bundle
    post:
      summary: Raw FHIR create
      operationId: fhirPost
      tags: [FHIR Passthrough]
      description: Create a raw FHIR R4 resource. Tenant tag is injected into meta.tag automatically.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              type: object
      responses:
        '201':
          description: Resource created
    patch:
      summary: Raw FHIR patch
      operationId: fhirPatch
      tags: [FHIR Passthrough]
      description: Update a FHIR R4 resource using JSON Patch (RFC 6902).
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              type: array
              items:
                type: object
                required: [op, path]
                properties:
                  op:
                    type: string
