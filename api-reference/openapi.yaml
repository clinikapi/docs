openapi: 3.1.0
info:
  title: ClinikAPI
  version: 1.0.0
  description: |
    ClinikAPI is a managed healthcare infrastructure platform providing a developer-friendly REST API
    for storing, querying, and managing clinical data using the FHIR R4 standard on AWS HealthLake.

    ## Authentication
    All endpoints (except `/v1/metadata` and `/health`) require an API key via the `x-api-key` header.
    - Production keys: `clk_live_*`
    - Test/sandbox keys: `clk_test_*`

    ## Response Format
    All responses are wrapped in `{ data: T, meta: { requestId, timestamp, status, rateLimitTotal, rateLimitRemaining, rateLimitReset } }`.

    ## Rate Limits
    Rate limits are plan-based and returned in response headers:
    - `X-RateLimit-Limit` — total requests allowed per window
    - `X-RateLimit-Remaining` — requests remaining
    - `X-RateLimit-Reset` — seconds until window resets

    ## Overages
    Requests beyond your plan limit are charged at $0.003/request.
  contact:
    name: ClinikAPI Support
    email: support@clinikapi.com
    url: https://clinikapi.com
  license:
    name: Proprietary
servers:
  - url: https://api.clinikapi.com
    description: Production
  - url: http://localhost:3000
    description: Local development

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Your ClinikAPI secret key (clk_live_* or clk_test_*)

  schemas:
    ApiResponse:
      type: object
      properties:
        data:
          description: The resource or result payload
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    ResponseMeta:
      type: object
      properties:
        requestId:
          type: string
          example: req_k8f3a7x2
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          example: 200
        rateLimitTotal:
          type: integer
        rateLimitRemaining:
          type: integer
        rateLimitReset:
          type: integer

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        total:
          type: integer
        cursor:
          type: string
        hasMore:
          type: boolean

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        code:
          type: string
        requestId:
          type: string
        issues:
          type: array
          items:
            type: object
            properties:
              severity:
                type: string
              code:
                type: string
              diagnostics:
                type: string

    CodeableConcept:
      oneOf:
        - type: string
        - type: object
          properties:
            system:
              type: string
            code:
              type: string
            display:
              type: string

    Address:
      type: object
      properties:
        line:
          type: array
          items:
            type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string

    PatientCreate:
      type: object
      required: [firstName, lastName]
      properties:
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          type: string
          maxLength: 20
        gender:
          type: string
          enum: [male, female, other, unknown]
        birthDate:
          type: string
          description: Date of birth (YYYY-MM-DD)
        address:
          $ref: '#/components/schemas/Address'

    PractitionerCreate:
      type: object
      required: [firstName, lastName]
      properties:
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        prefix:
          type: array
          items:
            type: string
          description: Name prefixes (e.g. Dr., Prof.)
        suffix:
          type: array
          items:
            type: string
          description: Name suffixes (e.g. MD, PhD, FACC)
        email:
          type: string
          format: email
        phone:
          type: string
          maxLength: 20
        gender:
          type: string
          enum: [male, female, other, unknown]
        birthDate:
          type: string
        npi:
          type: string
          description: National Provider Identifier (US)
          maxLength: 20
        specialty:
          type: string
          maxLength: 200
          description: Primary specialty (e.g. Cardiology, Family Medicine)
        qualifications:
          type: array
          maxItems: 20
          items:
            type: object
            required: [name]
            properties:
              name:
                type: string
                maxLength: 200
              issuer:
                type: string
                maxLength: 200
              period:
                type: object
                properties:
                  start:
                    type: string
                  end:
                    type: string
              identifier:
                type: string
                maxLength: 100
        languages:
          type: array
          items:
            type: string
          description: BCP-47 language codes
        address:
          $ref: '#/components/schemas/Address'

    PractitionerRoleCreate:
      type: object
      required: [practitionerId, role]
      properties:
        practitionerId:
          type: string
        role:
          type: string
          description: Role code (doctor, nurse, pharmacist, admin, consultant)
          maxLength: 100
        organizationName:
          type: string
          maxLength: 200
        specialty:
          type: array
          items:
            type: string
        locationName:
          type: string
          maxLength: 200
        phone:
          type: string
        email:
          type: string
          format: email
        availableDays:
          type: array
          items:
            type: string
            enum: [mon, tue, wed, thu, fri, sat, sun]
        availableStartTime:
          type: string
          description: Start time (HH:mm format)
        availableEndTime:
          type: string
          description: End time (HH:mm format)

    EncounterCreate:
      type: object
      required: [status, class, patientId]
      properties:
        status:
          type: string
          enum: [planned, arrived, triaged, in-progress, onleave, finished, cancelled]
        class:
          type: string
          description: AMB (ambulatory), IMP (inpatient), EMER (emergency), HH (home health), VR (virtual)
        patientId:
          type: string
        practitionerId:
          type: string
        type:
          type: string
          maxLength: 200
        serviceType:
          type: string
          maxLength: 200
        priority:
          type: string
          maxLength: 50
        reasonCode:
          type: string
          maxLength: 500
        period:
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
        lengthMinutes:
          type: integer
          maximum: 10080
        location:
          type: string
          maxLength: 200
        serviceProvider:
          type: string
          maxLength: 200
        diagnosis:
          type: array
          maxItems: 20
          items:
            type: object
            properties:
              condition:
                type: string
              use:
                type: string
              rank:
                type: integer

    ObservationCreate:
      type: object
      required: [status, code, patientId]
      properties:
        status:
          type: string
          enum: [registered, preliminary, final, amended, corrected, cancelled]
        code:
          $ref: '#/components/schemas/CodeableConcept'
        patientId:
          type: string
        encounterId:
          type: string
        performerId:
          type: string
        effectiveDateTime:
          type: string
          format: date-time
        valueQuantity:
          type: object
          properties:
            value:
              type: number
            unit:
              type: string
            system:
              type: string
            code:
              type: string
        valueString:
          type: string
          maxLength: 2000
        valueCodeableConcept:
          type: object
          properties:
            system:
              type: string
            code:
              type: string
            display:
              type: string
        component:
          type: array
          maxItems: 20
          items:
            type: object
            properties:
              code:
                $ref: '#/components/schemas/CodeableConcept'
              valueQuantity:
                type: object
                properties:
                  value:
                    type: number
                  unit:
                    type: string
              valueString:
                type: string
        category:
          type: string
          description: vital-signs, laboratory, social-history, exam
        interpretation:
          type: string
          description: H (high), L (low), N (normal), A (abnormal), HH, LL
          maxLength: 10
        referenceRange:
          type: object
          properties:
            low:
              type: object
              properties:
                value:
                  type: number
                unit:
                  type: string
            high:
              type: object
              properties:
                value:
                  type: number
                unit:
                  type: string
            text:
              type: string
        bodySite:
          type: string
          maxLength: 200
        method:
          type: string
          maxLength: 200
        note:
          type: string
          maxLength: 2000

    MedicationCreate:
      type: object
      required: [code]
      properties:
        code:
          $ref: '#/components/schemas/CodeableConcept'
        status:
          type: string
          enum: [active, inactive]
        form:
          type: string
          maxLength: 100
        ingredient:
          type: array
          items:
            type: object
            properties:
              item:
                $ref: '#/components/schemas/CodeableConcept'
              isActive:
                type: boolean
              strength:
                type: object
                properties:
                  numerator:
                    type: object
                    properties:
                      value:
                        type: number
                      unit:
                        type: string
                  denominator:
                    type: object
                    properties:
                      value:
                        type: number
                      unit:
                        type: string
        batch:
          type: object
          properties:
            lotNumber:
              type: string
            expirationDate:
              type: string

    AppointmentCreate:
      type: object
      required: [status, patientId]
      properties:
        status:
          type: string
          enum: [proposed, pending, booked, arrived, fulfilled, cancelled, noshow, checked-in, waitlist]
        patientId:
          type: string
        practitionerId:
          type: string
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        minutesDuration:
          type: integer
          maximum: 1440
        appointmentType:
          type: string
          maxLength: 100
        serviceType:
          type: string
          maxLength: 200
        serviceCategory:
          type: string
          maxLength: 200
        specialty:
          type: string
          maxLength: 200
        reasonCode:
          type: string
          maxLength: 500
        priority:
          type: integer
          minimum: 0
          maximum: 9
        description:
          type: string
          maxLength: 2000
        comment:
          type: string
          maxLength: 2000
        patientInstruction:
          type: string
          maxLength: 2000
        cancelationReason:
          type: string
          maxLength: 500

    PrescriptionCreate:
      type: object
      required: [patientId, prescriberId, medication]
      properties:
        patientId:
          type: string
        prescriberId:
          type: string
        encounterId:
          type: string
        medication:
          $ref: '#/components/schemas/CodeableConcept'
        intent:
          type: string
          enum: [proposal, plan, order, original-order]
          default: order
        status:
          type: string
          enum: [active, on-hold, cancelled, completed, draft]
          default: active
        priority:
          type: string
          enum: [routine, urgent, asap, stat]
        dosageText:
          type: string
          maxLength: 1000
        dosage:
          type: object
          properties:
            dose:
              type: object
              properties:
                value:
                  type: number
                unit:
                  type: string
            frequency:
              type: integer
            period:
              type: number
            periodUnit:
              type: string
              enum: [h, d, wk, mo]
            route:
              type: string
        refills:
          type: integer
          minimum: 0
          maximum: 99
        quantity:
          type: object
          properties:
            value:
              type: number
            unit:
              type: string
        supplyDays:
          type: integer
        substitutionAllowed:
          type: boolean
        reason:
          type: string
          maxLength: 500
        note:
          type: string
          maxLength: 2000

    IntakeCreate:
      type: object
      required: [patientId, items]
      properties:
        patientId:
          type: string
        encounterId:
          type: string
        authorId:
          type: string
        sourceId:
          type: string
        questionnaire:
          type: string
        status:
          type: string
          enum: [in-progress, completed, amended, stopped]
        authored:
          type: string
          format: date-time
        items:
          type: array
          maxItems: 200
          items:
            type: object
            required: [linkId]
            properties:
              linkId:
                type: string
              text:
                type: string
              answer:
                type: array
                items:
                  type: object
                  properties:
                    valueString:
                      type: string
                    valueBoolean:
                      type: boolean
                    valueInteger:
                      type: integer
                    valueDecimal:
                      type: number
                    valueDate:
                      type: string
                    valueDateTime:
                      type: string
                    valueCoding:
                      type: object
                      properties:
                        system:
                          type: string
                        code:
                          type: string
                        display:
                          type: string
                    valueQuantity:
                      type: object
                      properties:
                        value:
                          type: number
                        unit:
                          type: string
              items:
                type: array
                items:
                  type: object
                  properties:
                    linkId:
                      type: string
                    text:
                      type: string
                    answer:
                      type: array
                      items:
                        type: object

    ConsentCreate:
      type: object
      required: [patientId, scope, category]
      properties:
        patientId:
          type: string
        status:
          type: string
          enum: [draft, proposed, active, rejected, inactive]
        scope:
          type: string
          description: patient-privacy, research, treatment, adr
        category:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        dateTime:
          type: string
          format: date-time
        performerId:
          type: string
        organizationId:
          type: string
        policyUri:
          type: string
        verification:
          type: object
          properties:
            verified:
              type: boolean
            verifiedWith:
              type: string
            verificationDate:
              type: string
        provision:
          type: object
          properties:
            type:
              type: string
              enum: [deny, permit]
            period:
              type: object
              properties:
                start:
                  type: string
                end:
                  type: string
            purpose:
              type: array
              items:
                type: object
                properties:
                  system:
                    type: string
                  code:
                    type: string
                  display:
                    type: string
            action:
              type: array
              items:
                type: object
                properties:
                  system:
                    type: string
                  code:
                    type: string
                  display:
                    type: string

    LabCreate:
      type: object
      required: [status, code, patientId]
      properties:
        status:
          type: string
          enum: [registered, partial, preliminary, final, amended, corrected, appended, cancelled]
        code:
          $ref: '#/components/schemas/CodeableConcept'
        patientId:
          type: string
        encounterId:
          type: string
        effectiveDateTime:
          type: string
          format: date-time
        resultIds:
          type: array
          items:
            type: string
          description: Observation IDs included in this report
        category:
          type: string
          description: LAB, RAD, PAT
        conclusion:
          type: string
          maxLength: 5000
        conclusionCodes:
          type: array
          items:
            type: object
            properties:
              system:
                type: string
              code:
                type: string
              display:
                type: string
        performer:
          type: string
        resultsInterpreter:
          type: string
        specimenIds:
          type: array
          items:
            type: string
        presentedForm:
          type: array
          items:
            type: object
            properties:
              contentType:
                type: string
              data:
                type: string
              url:
                type: string
              title:
                type: string

    NoteCreate:
      type: object
      required: [patientId, title, content]
      properties:
        patientId:
          type: string
        authorId:
          type: string
        encounterId:
          type: string
        type:
          type: string
          enum: [progress-note, discharge-summary, consultation-note, history-and-physical, operative-note, procedure-note, referral-note, transfer-summary, other]
        title:
          type: string
          maxLength: 500
        content:
          type: string
          maxLength: 100000
        contentType:
          type: string
          default: text/plain
        docStatus:
          type: string
          enum: [preliminary, final, amended]
        category:
          type: string
          maxLength: 100
        date:
          type: string

    AssessmentCreate:
      type: object
      required: [status, patientId, summary]
      properties:
        status:
          type: string
          enum: [in-progress, completed]
        patientId:
          type: string
        encounterId:
          type: string
        practitionerId:
          type: string
        description:
          type: string
          maxLength: 2000
        summary:
          type: string
          maxLength: 5000
        findings:
          type: array
          maxItems: 50
          items:
            type: object
            properties:
              code:
                type: string
              text:
                type: string
        note:
          type: string
          maxLength: 2000
        effectiveDateTime:
          type: string
          format: date-time

    DocumentCreate:
      type: object
      required: [status, type, patientId, practitionerId, title, sections]
      properties:
        status:
          type: string
          enum: [preliminary, final, amended]
        type:
          type: string
          maxLength: 100
          description: Document type (discharge-summary, referral-letter, care-plan, etc.)
        patientId:
          type: string
        encounterId:
          type: string
        practitionerId:
          type: string
        title:
          type: string
          maxLength: 500
        date:
          type: string
          format: date-time
        confidentiality:
          type: string
          enum: [N, R, V]
          description: N (normal), R (restricted), V (very restricted)
        sections:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: object
            required: [title, text]
            properties:
              title:
                type: string
                maxLength: 200
              code:
                type: string
              text:
                type: string
                maxLength: 50000
              resourceIds:
                type: array
                items:
                  type: string

  parameters:
    PathId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource ID
    QueryCount:
      name: count
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
      description: Results per page
    QueryCursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Pagination cursor from previous response
    QueryPatientId:
      name: patientId
      in: query
      schema:
        type: string
      description: Filter by patient ID
    QueryStatus:
      name: status
      in: query
      schema:
        type: string
      description: Filter by resource status
    QueryDateFrom:
      name: dateFrom
      in: query
      schema:
        type: string
        format: date
      description: Filter resources from this date
    QueryDateTo:
      name: dateTo
      in: query
      schema:
        type: string
        format: date
      description: Filter resources up to this date
    QuerySort:
      name: sort
      in: query
      schema:
        type: string
      description: Sort field (prefix with - for descending)

paths:
  # =========================================================================
  # System
  # =========================================================================
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      security: []
      tags: [System]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /v1/metadata:
    get:
      summary: FHIR CapabilityStatement
      operationId: getMetadata
      security: []
      tags: [System]
      description: Returns a FHIR R4 CapabilityStatement describing supported resources and operations. No authentication required.
      responses:
        '200':
          description: FHIR CapabilityStatement
          content:
            application/fhir+json:
              schema:
                type: object

  # =========================================================================
  # Patients
  # =========================================================================
  /v1/patients:
    post:
      summary: Create patient
      operationId: createPatient
      tags: [Patients]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientCreate'
      responses:
        '201':
          description: Patient created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: Search patients
      operationId: searchPatients
      tags: [Patients]
      parameters:
        - name: name
          in: query
          schema:
            type: string
          description: Search by name (partial match)
        - name: email
          in: query
          schema:
            type: string
        - name: phone
          in: query
          schema:
            type: string
        - name: gender
          in: query
          schema:
            type: string
        - name: birthDate
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/QueryCount'
        - $ref: '#/components/parameters/QueryCursor'
      responses:
        '200':
          description: Paginated patient list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /v1/patients/{id}:
    get:
      summary: Read patient
      operationId: readPatient
      tags: [Patients]
      parameters:
        - $ref: '#/components/parameters/PathId'
        - name: _revinclude
          in: query
          schema:
            type: array
            items:
              type: string
          description: Include related resources (e.g. Encounter:subject, Observation:subject)
      responses:
        '200':
          description: Patient with optional included resources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    patch:
      summary: Update patient
      operationId: updatePatient
      tags: [Patients]
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Partial patient fields to update
      responses:
        '200':
          description: Patient updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    delete:
      summary: Delete patient
      operationId: deletePatient
      tags: [Patients]
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '204':
          description: Patient deleted

  # =========================================================================
  # Practitioners
  # =========================================================================
  /v1/practitioners:
    post:
      summary: Create practitioner
      operationId: createPractitioner
      tags: [Practitioners]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PractitionerCreate'
      responses:
        '201':
          description: Practitioner created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: Search practitioners
      operationId: searchPractitioners
      tags: [Practitioners]
      parameters:
        - name: name
          in: query
          schema:
            type: string
          description: Search by name (partial match)
        - name: specialty
          in: query
          schema:
            type: string
        - name: npi
          in: query
          schema:
            type: string
          description: Exact NPI match
        - name: active
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/QueryCount'
        - $ref: '#/components/parameters/QueryCursor'
      responses:
        '200':
          description: Paginated practitioner list

  /v1/practitioners/{id}:
    get:
      summary: Read practitioner
      operationId: readPractitioner
      tags: [Practitioners]
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Practitioner details
    patch:
      summary: Update practitioner
      operationId: updatePractitioner
      tags: [Practitioners]
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
