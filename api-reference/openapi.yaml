  # =========================================================================
  # Bulk Operations
  # =========================================================================
  /v1/bulk/export:
    post:
      summary: Start bulk export
      operationId: bulkExport
      tags: [Bulk]
      description: Export tenant data as NDJSON. Returns a job ID for status polling. Rate limited to 5 operations per hour.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resourceTypes]
              properties:
                resourceTypes:
                  type: array
                  items:
                    type: string
                  description: FHIR resource types to export (e.g. Patient, Encounter, Observation)
                since:
                  type: string
                  format: date-time
                  description: Only export resources modified after this date
      responses:
        '202':
          description: Export job started
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      jobId:
                        type: string
                      status:
                        type: string
                      message:
                        type: string

  /v1/bulk/import:
    post:
      summary: Start bulk import
      operationId: bulkImport
      tags: [Bulk]
      description: Import NDJSON data. Max 10,000 records per batch. Tenant tags are injected automatically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resourceType, data]
              properties:
                resourceType:
                  type: string
                  description: FHIR resource type (e.g. Patient, Observation)
                data:
                  type: string
                  description: NDJSON content (one JSON resource per line)
                  maxLength: 104857600
      responses:
        '202':
          description: Import job started

  /v1/bulk/jobs/{jobId}:
    get:
      summary: Get bulk job status
      operationId: getBulkJobStatus
      tags: [Bulk]
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                        enum: [import, export]
                      status:
                        type: string
                        enum: [pending, processing, completed, failed]
                      totalRecords:
                        type: integer
                      processedRecords:
                        type: integer
                      downloadUrl:
                        type: string
                        description: Pre-signed S3 URL (export only, valid for 1 hour)
                      errors:
                        type: array
                        items:
                          type: string

  # =========================================================================
  # FHIR Passthrough
  # =========================================================================
  /v1/fhir/{path}:
    get:
      summary: Raw FHIR read/search
      operationId: fhirGet
      tags: [FHIR Passthrough]
      description: Direct FHIR R4 read or search with automatic tenant isolation. Tenant tag filter is appended to all searches.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: FHIR path (e.g. Patient/123, Observation?code=8867-4)
      responses:
        '200':
          description: FHIR resource or Bundle
    post:
      summary: Raw FHIR create
      operationId: fhirPost
      tags: [FHIR Passthrough]
      description: Create a raw FHIR R4 resource. Tenant tag is injected into meta.tag automatically.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              type: object
      responses:
        '201':
          description: Resource created
    patch:
      summary: Raw FHIR patch
      operationId: fhirPatch
      tags: [FHIR Passthrough]
      description: Update a FHIR R4 resource using JSON Patch (RFC 6902).
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              type: array
              items:
                type: object
                required: [op, path]
                properties:
                  op:
                    type: string
                    enum: [add, remove, replace, move, copy, test]
                  path:
                    type: string
                  value: {}
      responses:
        '200':
          description: Resource patched
    delete:
      summary: Raw FHIR delete
      operationId: fhirDelete
      tags: [FHIR Passthrough]
      description: Delete a FHIR R4 resource. Ownership is verified before deletion.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Resource deleted

tags:
  - name: System
    description: Health check and metadata
  - name: Patients
    description: Patient demographics and records
  - name: Practitioners
    description: Healthcare providers and clinicians
  - name: PractitionerRoles
    description: Practitioner roles, specialties, and availability
  - name: Encounters
    description: Clinical visits and interactions
  - name: Observations
    description: Vitals, lab values, and clinical measurements
  - name: Medications
    description: Drug catalog entries
  - name: Appointments
    description: Scheduling and booking
  - name: Prescriptions
    description: Medication orders (MedicationRequest)
  - name: Intakes
    description: Questionnaire responses and intake forms
  - name: Consents
    description: Privacy and treatment consent directives
  - name: Labs
    description: Diagnostic reports and lab results
  - name: Notes
    description: Clinical notes and documents (DocumentReference)
  - name: Assessments
    description: Clinical impressions and evaluations
  - name: Documents
    description: Structured clinical documents (Composition)
  - name: Devices
    description: Medical devices, equipment, and implantable hardware
  - name: DeviceRequests
    description: Orders and proposals for device use
  - name: DeviceUseStatements
    description: Records of device use on patients
  - name: Goals
    description: Patient care goals and targets
  - name: Invoices
    description: Healthcare billing invoices
  - name: MedicationDispenses
    description: Pharmacy medication dispensing records
  - name: MedicationKnowledge
    description: Drug reference data and formulary information
  - name: MedicationStatements
    description: Patient-reported medication usage records
  - name: PaymentNotices
    description: Payment status notifications between payers and providers
  - name: PaymentReconciliations
    description: Detailed payment settlement information with line-item breakdowns
  - name: Specimens
    description: Biological samples collected from patients for laboratory testing
  - name: ImagingStudies
    description: Radiology and diagnostic imaging exams with series-level detail
  - name: EnrollmentRequests
    description: Insurance enrollment requests for patients
  - name: EnrollmentResponses
    description: Insurer responses to enrollment requests
  - name: ImmunizationEvaluations
    description: Evaluation of immunization events against protocol requirements
  - name: Media
    description: Clinical images, videos, and audio recordings
  - name: AuditEvents
    description: Security-relevant event records for compliance and audit trails
  - name: Measures
    description: Quality measures and clinical performance metric definitions
  - name: MeasureReports
    description: Results of evaluating quality measures against populations or patients
  - name: ImmunizationRecommendations
    description: Patient-specific vaccine recommendations based on immunization history
  - name: Bulk
    description: Bulk import and export operations
  - name: FHIR Passthrough
    description: Raw FHIR R4 access with tenant isolation
