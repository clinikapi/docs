  # --- Documents (Composition) ---
  /v1/documents:
    post:
      summary: Create document
      operationId: createDocument
      tags: [Documents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status, type, patientId, practitionerId, title, sections]
              properties:
                status: { type: string, enum: [preliminary, final, amended] }
                type: { type: string, description: 'progress-note, discharge-summary, consultation-note, etc.' }
                patientId: { type: string }
                encounterId: { type: string }
                practitionerId: { type: string }
                title: { type: string, maxLength: 500 }
                date: { type: string, format: date-time }
                confidentiality: { type: string, enum: [N, R, V] }
                sections:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [title, text]
                    properties:
                      title: { type: string }
                      code: { type: string }
                      text: { type: string, maxLength: 50000 }
                      resourceIds:
                        type: array
                        items: { type: string }
      responses:
        '201':
          description: Document created
    get:
      summary: Search documents
      operationId: searchDocuments
      tags: [Documents]
      parameters:
        - $ref: '#/components/parameters/QueryPatientId'
        - name: type
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/QueryStatus'
        - $ref: '#/components/parameters/QueryDateFrom'
        - $ref: '#/components/parameters/QueryDateTo'
        - $ref: '#/components/parameters/QueryCount'
        - $ref: '#/components/parameters/QueryCursor'
      responses:
