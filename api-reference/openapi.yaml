openapi: 3.1.0
info:
  title: ClinikAPI
  version: 1.0.0
  description: |
    ClinikAPI is a managed healthcare infrastructure platform providing a developer-friendly REST API
    for storing, querying, and managing clinical data using the FHIR R4 standard.

    ## Authentication
    All endpoints (except `/v1/metadata` and `/health`) require an API key via the `x-api-key` header.
    - Production keys: `clk_live_*`
    - Test/sandbox keys: `clk_test_*`

    ## Response Format
    All responses are wrapped in `{ data: T, meta: { requestId, timestamp, status, rateLimitTotal, rateLimitRemaining, rateLimitReset } }`.

    ## Rate Limits
    Rate limits are plan-based and returned in response headers:
    - `X-RateLimit-Limit` — total requests allowed per window
    - `X-RateLimit-Remaining` — requests remaining
    - `X-RateLimit-Reset` — seconds until window resets

    ## Overages
    Requests beyond your plan limit are charged at $0.003/request.
  contact:
    name: ClinikAPI Support
    email: support@clinikapi.com
    url: https://clinikapi.com
  license:
    name: Proprietary
servers:
  - url: https://api.clinikapi.com
    description: Production
  - url: http://localhost:3000
    description: Local development

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Your ClinikAPI secret key (clk_live_* or clk_test_*)

  schemas:
    ApiResponse:
      type: object
      properties:
        data:
          description: The resource or result payload
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    ResponseMeta:
      type: object
      properties:
        requestId:
          type: string
          example: req_k8f3a7x2
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          example: 200
        rateLimitTotal:
          type: integer
        rateLimitRemaining:
          type: integer
        rateLimitReset:
          type: integer

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        total:
          type: integer
        cursor:
          type: string
        hasMore:
          type: boolean

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        code:
          type: string
        requestId:
          type: string
        issues:
          type: array
          items:
            type: object
            properties:
              severity:
                type: string
              code:
                type: string
              diagnostics:
                type: string

    CodeableConcept:
      oneOf:
        - type: string
        - type: object
          properties:
            system:
              type: string
            code:
              type: string
            display:
              type: string

    Address:
      type: object
      properties:
        line:
          type: array
          items:
            type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string

    PatientCreate:
      type: object
      required: [firstName, lastName]
      properties:
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          type: string
          maxLength: 20
        gender:
          type: string
          enum: [male, female, other, unknown]
        birthDate:
          type: string
          description: Date of birth (YYYY-MM-DD)
        address:
          $ref: '#/components/schemas/Address'
        maritalStatus:
          type: string
          maxLength: 50
          description: Marital status (married, single, divorced, widowed)
        photo:
          type: object
          properties:
            url:
              type: string
              format: uri
            data:
              type: string
              description: Base64-encoded image
            contentType:
              type: string
        contact:
          type: array
          maxItems: 10
          description: Emergency contacts / next of kin
          items:
            type: object
            properties:
              relationship:
                type: string
              firstName:
                type: string
              lastName:
                type: string
              phone:
                type: string
              email:
                type: string
                format: email
              address:
                $ref: '#/components/schemas/Address'
        languages:
          type: array
          maxItems: 20
          description: Languages the patient speaks
          items:
            type: object
            required: [language]
            properties:
              language:
                type: string
                description: BCP-47 language code or display name
              preferred:
                type: boolean
        generalPractitionerId:
          type: string
          description: Reference to the patient's GP (Practitioner ID)

    PractitionerCreate:
      type: object
      required: [firstName, lastName]
      properties:
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        prefix:
          type: array
          items:
            type: string
          description: Name prefixes (e.g. Dr., Prof.)
        suffix:
          type: array
          items:
            type: string
          description: Name suffixes (e.g. MD, PhD, FACC)
        email:
          type: string
          format: email
        phone:
          type: string
          maxLength: 20
        gender:
          type: string
          enum: [male, female, other, unknown]
        birthDate:
          type: string
        npi:
          type: string
          description: National Provider Identifier (US)
          maxLength: 20
        specialty:
          type: string
          maxLength: 200
          description: Primary specialty (e.g. Cardiology, Family Medicine)
        qualifications:
          type: array
          maxItems: 20
          items:
            type: object
            required: [name]
            properties:
              name:
                type: string
                maxLength: 200
              issuer:
                type: string
                maxLength: 200
              period:
                type: object
                properties:
                  start:
                    type: string
                  end:
                    type: string
              identifier:
                type: string
                maxLength: 100
        languages:
          type: array
          items:
            type: string
          description: BCP-47 language codes
        address:
          $ref: '#/components/schemas/Address'
        photo:
          type: object
          description: Practitioner photo
          properties:
            url:
              type: string
              format: uri
              description: URL to the photo
            data:
              type: string
              description: Base64-encoded image data
            contentType:
              type: string
              description: MIME type (e.g. image/jpeg)
              maxLength: 100

    PractitionerRoleCreate:
      type: object
      required: [practitionerId, role]
      properties:
        practitionerId:
          type: string
        role:
          type: string
          description: Role code (doctor, nurse, pharmacist, admin, consultant)
          maxLength: 100
        organizationName:
          type: string
          maxLength: 200
        specialty:
          type: array
          items:
            type: string
        locationName:
          type: string
          maxLength: 200
        phone:
          type: string
        email:
          type: string
          format: email
        period:
          type: object
          description: Period during which the role is valid
          properties:
            start:
              type: string
            end:
              type: string
        availableTime:
          type: array
          description: Multiple availability schedules
          items:
            type: object
            properties:
              daysOfWeek:
                type: array
                items:
                  type: string
                  enum: [mon, tue, wed, thu, fri, sat, sun]
              allDay:
                type: boolean
                description: Whether available all day (24h)
              availableStartTime:
                type: string
                description: Start time (HH:mm:ss format)
              availableEndTime:
                type: string
                description: End time (HH:mm:ss format)
        notAvailable:
          type: array
          description: Periods when the practitioner is not available
          items:
            type: object
            required: [description]
            properties:
              description:
                type: string
                maxLength: 500
                description: Reason (e.g. On vacation, Conference)
              during:
                type: object
                properties:
                  start:
                    type: string
                  end:
                    type: string
        availabilityExceptions:
          type: string
          maxLength: 1000
          description: Free-text description of availability exceptions
        availableDays:
          type: array
          description: "Legacy: use availableTime instead"
          items:
            type: string
            enum: [mon, tue, wed, thu, fri, sat, sun]
        availableStartTime:
          type: string
          description: "Legacy: use availableTime instead"
        availableEndTime:
          type: string
          description: "Legacy: use availableTime instead"

    EncounterCreate:
      type: object
      required: [status, class, patientId]
      properties:
        status:
          type: string
          enum: [planned, arrived, triaged, in-progress, onleave, finished, cancelled]
        class:
          type: string
          description: AMB (ambulatory), IMP (inpatient), EMER (emergency), HH (home health), VR (virtual)
        patientId:
          type: string
        practitionerId:
          type: string
          description: Primary practitioner reference
        participants:
          type: array
          description: Additional participants (nurses, specialists)
          items:
            type: object
            required: [practitionerId]
            properties:
              practitionerId:
                type: string
              role:
                type: string
        type:
          type: string
          maxLength: 200
        serviceType:
          type: string
          maxLength: 200
        priority:
          type: string
          maxLength: 50
        reasonCode:
          type: string
          maxLength: 500
        period:
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
        lengthMinutes:
          type: integer
          maximum: 10080
        location:
          type: string
          maxLength: 200
        serviceProvider:
          type: string
          maxLength: 200
        diagnosis:
          type: array
          maxItems: 20
          items:
            type: object
            properties:
              condition:
                type: string
              use:
                type: string
              rank:
                type: integer
        appointmentId:
          type: string
          description: Appointment that scheduled this encounter
        basedOnId:
          type: string
          description: ServiceRequest that initiated this encounter
        partOfId:
          type: string
          description: Parent encounter ID (for sub-encounters)
        hospitalization:
          type: object
          description: Inpatient admission/discharge details
          properties:
            admitSource:
              type: string
              description: Where admitted from (ER, physician referral, transfer)
            dischargeDisposition:
              type: string
              description: Discharge destination (home, SNF, expired)
            reAdmission:
              type: string
              description: Re-admission type
            dietPreference:
              type: array
              items:
                type: string
            specialArrangement:
              type: array
              items:
                type: string
              description: Wheelchair, translator, stretcher, etc.
            destination:
              type: string
              description: Discharge destination facility
            origin:
              type: string
              description: Originating facility

    ObservationCreate:
      type: object
      required: [status, code, patientId]
      properties:
        status:
          type: string
          enum: [registered, preliminary, final, amended, corrected, cancelled]
        code:
          $ref: '#/components/schemas/CodeableConcept'
        patientId:
          type: string
        encounterId:
          type: string
        performerId:
          type: string
        effectiveDateTime:
          type: string
          format: date-time
        issued:
          type: string
          format: date-time
          description: When this version was made available
        valueQuantity:
          type: object
          properties:
            value:
              type: number
            unit:
              type: string
            system:
              type: string
            code:
              type: string
        valueString:
          type: string
          maxLength: 2000
        valueCodeableConcept:
          type: object
          properties:
            system:
              type: string
            code:
              type: string
            display:
              type: string
        component:
          type: array
          maxItems: 20
          items:
            type: object
            properties:
              code:
                $ref: '#/components/schemas/CodeableConcept'
              valueQuantity:
                type: object
                properties:
                  value:
                    type: number
                  unit:
                    type: string
              valueString:
                type: string
        category:
          type: string
          description: vital-signs, laboratory, social-history, exam
        interpretation:
          type: string
          description: H (high), L (low), N (normal), A (abnormal), HH, LL
          maxLength: 10
        referenceRange:
          type: object
          properties:
            low:
              type: object
              properties:
                value:
                  type: number
                unit:
                  type: string
            high:
              type: object
              properties:
                value:
                  type: number
                unit:
                  type: string
            text:
              type: string
        bodySite:
          type: string
          maxLength: 200
        method:
          type: string
          maxLength: 200
        specimenId:
          type: string
          description: Specimen reference
        deviceId:
          type: string
          description: Device reference
        note:
          type: string
          maxLength: 2000

    MedicationCreate:
      type: object
      required: [code]
      properties:
        code:
          $ref: '#/components/schemas/CodeableConcept'
        status:
          type: string
          enum: [active, inactive]
        form:
          type: string
          maxLength: 100
        manufacturer:
          type: string
          maxLength: 200
          description: Manufacturer name
        amount:
          type: object
          description: Total amount of drug in package
          properties:
            numerator:
              type: object
              properties:
                value:
                  type: number
                unit:
                  type: string
            denominator:
              type: object
              properties:
                value:
                  type: number
                unit:
                  type: string
        ingredient:
          type: array
          items:
            type: object
            properties:
              item:
                $ref: '#/components/schemas/CodeableConcept'
              isActive:
                type: boolean
              strength:
                type: object
                properties:
                  numerator:
                    type: object
                    properties:
                      value:
                        type: number
                      unit:
                        type: string
                  denominator:
                    type: object
                    properties:
                      value:
                        type: number
                      unit:
                        type: string
        batch:
          type: object
          properties:
            lotNumber:
              type: string
            expirationDate:
              type: string

    AppointmentCreate:
      type: object
      required: [status, patientId]
      properties:
        status:
          type: string
          enum: [proposed, pending, booked, arrived, fulfilled, cancelled, noshow, checked-in, waitlist]
        patientId:
          type: string
        practitionerId:
          type: string
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        minutesDuration:
          type: integer
          maximum: 1440
        appointmentType:
          type: string
          maxLength: 100
          description: Type of appointment (routine, walkin, urgent, followup)
        serviceType:
          type: string
          maxLength: 200
          description: Service being booked (e.g. cardiology consultation)
        serviceCategory:
          type: string
          maxLength: 200
          description: Service category (general-practice, specialist, dental)
        specialty:
          type: string
          maxLength: 200
          description: Required specialty (e.g. cardiology, dermatology)
        reasonCode:
          type: string
          maxLength: 500
          description: Reason for the appointment
        priority:
          type: integer
          minimum: 0
          maximum: 9
          description: 0 = routine, 1-9 = increasing urgency
        description:
          type: string
          maxLength: 2000
          description: Shown on a subject line in a meeting request
        comment:
          type: string
          maxLength: 2000
        patientInstruction:
          type: string
          maxLength: 2000
          description: Instructions for the patient (e.g. fast for 12 hours)
        cancelationReason:
          type: string
          maxLength: 500
          description: Reason for cancellation (when status is cancelled/noshow)
        basedOnId:
          type: string
          description: ServiceRequest ID this appointment is allocated to assess
        requestedPeriod:
          type: array
          description: Preferred time windows for the appointment
          items:
            type: object
            properties:
              start:
                type: string
                format: date-time
              end:
                type: string
                format: date-time
        created:
          type: string
          format: date-time
          description: When the appointment was initially created (defaults to now)

    PrescriptionCreate:
      type: object
      required: [patientId, prescriberId, medication]
      properties:
        patientId:
          type: string
        prescriberId:
          type: string
        encounterId:
          type: string
        medication:
          $ref: '#/components/schemas/CodeableConcept'
        intent:
          type: string
          enum: [proposal, plan, order, original-order]
          default: order
        status:
          type: string
          enum: [active, on-hold, cancelled, completed, draft]
          default: active
        statusReason:
          type: string
          maxLength: 500
          description: Reason for current status (e.g. why on-hold or cancelled)
        priority:
          type: string
          enum: [routine, urgent, asap, stat]
        category:
          type: string
          maxLength: 200
          description: Category of medication usage (inpatient, outpatient, community, discharge)
        doNotPerform:
          type: boolean
          description: True if this is a "do not perform" order
        authoredOn:
          type: string
          format: date-time
          description: When the prescription was authored (defaults to now)
        dosageText:
          type: string
          maxLength: 1000
        dosage:
          type: object
          properties:
            dose:
              type: object
              properties:
                value:
                  type: number
                unit:
                  type: string
            frequency:
              type: integer
            period:
              type: number
            periodUnit:
              type: string
              enum: [h, d, wk, mo]
            route:
              type: string
        refills:
          type: integer
          minimum: 0
          maximum: 99
        quantity:
          type: object
          properties:
            value:
              type: number
            unit:
              type: string
        supplyDays:
          type: integer
        substitutionAllowed:
          type: boolean
        reason:
          type: string
          maxLength: 500
        note:
          type: string
          maxLength: 2000
        performerId:
          type: string
          description: Intended performer of administration (Practitioner ID)
        courseOfTherapy:
          type: string
          maxLength: 200
          description: Course of therapy type (continuous, acute, seasonal)
        priorPrescriptionId:
          type: string
          description: Reference to a prior prescription being replaced

    IntakeCreate:
      type: object
      required: [patientId, items]
      properties:
        patientId:
          type: string
        encounterId:
          type: string
        authorId:
          type: string
          description: Who filled out the form (practitioner or device ID)
        sourceId:
          type: string
          description: Who provided the answers (patient, related person, practitioner)
        questionnaire:
          type: string
          description: Reference to the Questionnaire definition (canonical URL or ID)
        status:
          type: string
          enum: [in-progress, completed, amended, stopped]
        authored:
          type: string
          format: date-time
          description: When the answers were gathered (defaults to now)
        basedOn:
          type: array
          description: CarePlan or ServiceRequest IDs this intake fulfills
          items:
            type: string
        partOf:
          type: array
          description: Observation or Procedure IDs this intake is part of
          items:
            type: string
        items:
          type: array
          maxItems: 200
          items:
            type: object
            required: [linkId]
            properties:
              linkId:
                type: string
              definition:
                type: string
                description: ElementDefinition URI for the item
              text:
                type: string
              answer:
                type: array
                items:
                  type: object
                  properties:
                    valueString:
                      type: string
                    valueBoolean:
                      type: boolean
                    valueInteger:
                      type: integer
                    valueDecimal:
                      type: number
                    valueDate:
                      type: string
                    valueDateTime:
                      type: string
                    valueTime:
                      type: string
                    valueCoding:
                      type: object
                      properties:
                        system:
                          type: string
                        code:
                          type: string
                        display:
                          type: string
                    valueQuantity:
                      type: object
                      properties:
                        value:
                          type: number
                        unit:
                          type: string
                    valueUri:
                      type: string
              items:
                type: array
                description: Nested sub-items (recursive)
                items:
                  type: object
                  properties:
                    linkId:
                      type: string
                    definition:
                      type: string
                    text:
                      type: string
                    answer:
                      type: array
                      items:
                        type: object

    ConsentCreate:
      type: object
      required: [patientId, scope, category]
      properties:
        patientId:
          type: string
        status:
          type: string
          enum: [draft, proposed, active, rejected, inactive]
        scope:
          type: string
          description: patient-privacy, research, treatment, adr
        category:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        dateTime:
          type: string
          format: date-time
        performerId:
          type: string
          description: Who is agreeing (practitioner, patient)
        organizationId:
          type: string
          description: Custodian organization
        policyUri:
          type: string
          description: Policy URI the consent references
        policies:
          type: array
          description: Multiple policies with authority
          items:
            type: object
            properties:
              authority:
                type: string
              uri:
                type: string
        policyRule:
          type: string
          description: Regulation that this consents to
        sourceAttachment:
          type: object
          description: Source document (attachment)
          properties:
            contentType:
              type: string
            data:
              type: string
            url:
              type: string
            title:
              type: string
        sourceReferenceId:
          type: string
          description: Source document reference ID
        verification:
          type: array
          description: Verification details (supports multiple)
          items:
            type: object
            required: [verified]
            properties:
              verified:
                type: boolean
              verifiedWith:
                type: string
              verificationDate:
                type: string
        provision:
          type: object
          description: Provision rules (permit/deny) with nested exceptions
          properties:
            type:
              type: string
              enum: [deny, permit]
            period:
              type: object
              properties:
                start:
                  type: string
                end:
                  type: string
            actor:
              type: array
              items:
                type: object
                properties:
                  role:
                    type: string
                  reference:
                    type: string
            action:
              type: array
              items:
                type: object
                properties:
                  system:
                    type: string
                  code:
                    type: string
                  display:
                    type: string
            securityLabel:
              type: array
              items:
                type: object
                properties:
                  system:
                    type: string
                  code:
                    type: string
                  display:
                    type: string
            purpose:
              type: array
              items:
                type: object
                properties:
                  system:
                    type: string
                  code:
                    type: string
                  display:
                    type: string
            class:
              type: array
              items:
                type: object
                properties:
                  system:
                    type: string
                  code:
                    type: string
                  display:
                    type: string
            dataPeriod:
              type: object
              properties:
                start:
                  type: string
                end:
                  type: string
            data:
              type: array
              description: Specific data references controlled by this rule
              items:
                type: object
                required: [meaning, reference]
                properties:
                  meaning:
                    type: string
                    enum: [instance, related, dependents, authoredby]
                  reference:
                    type: string

    LabCreate:
      type: object
      required: [status, code, patientId]
      properties:
        status:
          type: string
          enum: [registered, partial, preliminary, final, amended, corrected, appended, cancelled]
        code:
          $ref: '#/components/schemas/CodeableConcept'
        patientId:
          type: string
        encounterId:
          type: string
        effectiveDateTime:
          type: string
          format: date-time
          description: When the report is clinically relevant (point in time)
        effectivePeriod:
          type: object
          description: When the report is clinically relevant (time range)
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
        resultIds:
          type: array
          items:
            type: string
          description: Observation IDs included in this report
        category:
          type: string
          description: LAB, RAD, PAT
        conclusion:
          type: string
          maxLength: 5000
        conclusionCodes:
          type: array
          items:
            type: object
            properties:
              system:
                type: string
              code:
                type: string
              display:
                type: string
        performer:
          type: string
          description: Practitioner who performed the diagnostic
        resultsInterpreter:
          type: string
          description: Practitioner who interpreted results
        specimenIds:
          type: array
          items:
            type: string
        presentedForm:
          type: array
          items:
            type: object
            properties:
              contentType:
                type: string
              data:
                type: string
              url:
                type: string
              title:
                type: string
        basedOn:
          type: array
          description: ServiceRequest IDs this report is based on
          items:
            type: string
        media:
          type: array
