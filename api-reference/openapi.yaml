                      properties:
                        system: { type: string }
                        code: { type: string }
                        display: { type: string }
                patientId: { type: string }
                encounterId: { type: string }
                conclusion: { type: string, maxLength: 5000 }
                performer: { type: string }
                resultIds:
                  type: array
