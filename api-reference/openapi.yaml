          type: string
          maxLength: 500
        description:
          type: string
          maxLength: 5000
        purpose:
          type: string
          maxLength: 5000
        usage:
          type: string
          maxLength: 5000
        publisher:
          type: string
          maxLength: 500
        date:
          type: string
          maxLength: 30
        version:
          type: string
          maxLength: 100
        url:
          type: string
          maxLength: 2000
        experimental:
          type: boolean
        scoring:
          type: string
          maxLength: 200
          description: proportion, ratio, continuous-variable, cohort
        type:
          type: array
          maxItems: 10
          items:
            type: string
            maxLength: 200
          description: process, outcome, structure, patient-reported-outcome, composite
        riskAdjustment:
          type: string
          maxLength: 5000
        rationale:
          type: string
          maxLength: 5000
        clinicalRecommendationStatement:
          type: string
          maxLength: 5000
        guidance:
          type: string
          maxLength: 5000
        topic:
          type: array
          maxItems: 10
          items:
            type: string
            maxLength: 200
        group:
          type: array
          maxItems: 20
          items:
            type: object
            properties:
              code:
                type: string
                maxLength: 200
              description:
                type: string
                maxLength: 2000

    MeasureReportCreate:
      type: object
      required: [status, type, measureId, period]
      properties:
        status:
          type: string
          enum: [complete, pending, error]
        type:
          type: string
          enum: [individual, subject-list, summary, data-collection]
        measureId:
          type: string
          maxLength: 2000
        patientId:
          type: string
          maxLength: 128
        date:
          type: string
          maxLength: 50
        reporterId:
          type: string
          maxLength: 128
        period:
          type: object
          required: [start, end]
          properties:
            start:
              type: string
              maxLength: 30
            end:
              type: string
              maxLength: 30
        group:
          type: array
          maxItems: 20
          items:
            type: object
            properties:
              code:
                type: string
                maxLength: 200
              population:
                type: array
                maxItems: 20
                items:
                  type: object
                  properties:
                    code:
                      type: string
                      maxLength: 200
                    count:
                      type: integer
              measureScore:
                type: object
                properties:
                  value:
                    type: number
                  unit:
                    type: string
                    maxLength: 50

    ImmunizationRecommendationCreate:
      type: object
      required: [patientId, date, recommendation]
      properties:
        patientId:
          type: string
          maxLength: 128
        date:
          type: string
          maxLength: 50
        authorityId:
          type: string
          maxLength: 128
        recommendation:
          type: array
          minItems: 1
          maxItems: 20
          items:
            type: object
            required: [forecastStatus]
            properties:
              vaccineCode:
                type: array
                maxItems: 10
                items:
                  type: string
                  maxLength: 500
              targetDisease:
                type: string
                maxLength: 200
              forecastStatus:
                type: string
                maxLength: 200
              forecastReason:
                type: array
                maxItems: 10
                items:
                  type: string
                  maxLength: 500
              description:
                type: string
                maxLength: 2000
              series:
                type: string
                maxLength: 200
              doseNumber:
                type: integer
              seriesDoses:
                type: integer
              dateCriterion:
                type: array
                maxItems: 10
                items:
                  type: object
                  required: [code, value]
                  properties:
                    code:
                      type: string
                      maxLength: 200
                    value:
                      type: string
                      maxLength: 50

  parameters:
    PathId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource ID
    QueryCount:
      name: count
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
      description: Results per page
    QueryCursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Pagination cursor from previous response
    QueryPatientId:
      name: patientId
      in: query
      schema:
        type: string
      description: Filter by patient ID
    QueryStatus:
      name: status
      in: query
      schema:
        type: string
      description: Filter by resource status
    QueryDateFrom:
      name: dateFrom
      in: query
      schema:
        type: string
        format: date
      description: Filter resources from this date
    QueryDateTo:
      name: dateTo
      in: query
      schema:
        type: string
        format: date
      description: Filter resources up to this date
    QuerySort:
      name: sort
      in: query
      schema:
        type: string
      description: Sort field (prefix with - for descending)

paths:
  # =========================================================================
  # System
  # =========================================================================
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      security: []
      tags: [System]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /v1/metadata:
    get:
      summary: FHIR CapabilityStatement
      operationId: getMetadata
      security: []
      tags: [System]
      description: Returns a FHIR R4 CapabilityStatement describing supported resources and operations. No authentication required.
      responses:
        '200':
          description: FHIR CapabilityStatement
          content:
            application/fhir+json:
              schema:
                type: object

  # =========================================================================
  # Patients
  # =========================================================================
  /v1/patients:
    post:
      summary: Create patient
      operationId: createPatient
      tags: [Patients]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientCreate'
      responses:
        '201':
          description: Patient created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      summary: Search patients
      operationId: searchPatients
      tags: [Patients]
      parameters:
        - name: name
          in: query
          schema:
            type: string
          description: Search by name (partial match)
        - name: email
          in: query
          schema:
            type: string
        - name: phone
          in: query
          schema:
            type: string
        - name: gender
          in: query
          schema:
            type: string
        - name: birthDate
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/QueryCount'
        - $ref: '#/components/parameters/QueryCursor'
      responses:
        '200':
          description: Paginated patient list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /v1/patients/{id}:
    get:
      summary: Read patient
      operationId: readPatient
      tags: [Patients]
      parameters:
        - $ref: '#/components/parameters/PathId'
        - name: _revinclude
          in: query
          schema:
            type: array
            items:
              type: string
          description: Include related resources (e.g. Encounter:subject, Observation:subject)
      responses:
        '200':
          description: Patient with optional included resources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    patch:
      summary: Update patient
      operationId: updatePatient
      tags: [Patients]
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Partial patient fields to update
      responses:
        '200':
          description: Patient updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    delete:
      summary: Delete patient
      operationId: deletePatient
      tags: [Patients]
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '204':
          description: Patient deleted

