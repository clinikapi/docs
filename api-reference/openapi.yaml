      operationId: updateDocument
      tags: [Documents]
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Document updated
    delete:
      summary: Delete document
      operationId: deleteDocument
      tags: [Documents]
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '204':
          description: Document deleted

  # --- Raw FHIR Passthrough ---
  /v1/fhir/{path}:
    get:
      summary: Raw FHIR read/search
      operationId: fhirGet
      tags: [FHIR Passthrough]
      description: Direct FHIR R4 read or search with automatic tenant isolation.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: 'FHIR path (e.g. Patient/123, Observation?code=8867-4)'
      responses:
        '200':
          description: FHIR resource or Bundle
    post:
      summary: Raw FHIR create
      operationId: fhirPost
      tags: [FHIR Passthrough]
      description: Create a raw FHIR R4 resource. Tenant tag is injected automatically.
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              type: object
      responses:
        '201':
          description: Resource created
    patch:
      summary: Raw FHIR patch
      operationId: fhirPatch
      tags: [FHIR Passthrough]
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              type: array
              items:
                type: object
                properties:
                  op:
                    type: string
                    enum: [add, remove, replace, move, copy, test]
                  path:
                    type: string
                  value: {}
      responses:
        '200':
          description: Resource patched
    delete:
      summary: Raw FHIR delete
      operationId: fhirDelete
      tags: [FHIR Passthrough]
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Resource deleted

tags:
  - name: System
    description: Health check and metadata
  - name: Patients
    description: Patient demographics and records
  - name: Practitioners
    description: Healthcare providers and clinicians
  - name: PractitionerRoles
    description: Practitioner roles, specialties, and availability
  - name: Encounters
    description: Clinical visits and interactions
  - name: Observations
    description: Vitals, lab values, and clinical measurements
  - name: Medications
    description: Drug catalog entries
  - name: Appointments
    description: Scheduling and booking
  - name: Prescriptions
    description: Medication orders (MedicationRequest)
  - name: Intakes
    description: Questionnaire responses and intake forms
  - name: Consents
    description: Privacy and treatment consent directives
  - name: Labs
    description: Diagnostic reports and lab results
  - name: Notes
    description: Clinical notes and documents (DocumentReference)
  - name: Assessments
    description: Clinical impressions and evaluations
  - name: Documents
    description: Structured clinical documents (Composition)
  - name: Bulk
    description: Bulk import and export operations
  - name: FHIR Passthrough
    description: Raw FHIR R4 access with tenant isolation
