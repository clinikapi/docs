  # --- Notes (DocumentReference) ---
  /v1/notes:
    post:
      summary: Create clinical note
      operationId: createNote
      tags: [Notes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patientId, title, content]
              properties:
                patientId: { type: string }
                authorId: { type: string }
                encounterId: { type: string }
                type:
                  type: string
                  enum: [progress-note, discharge-summary, consultation-note, history-and-physical, operative-note, procedure-note, referral-note, transfer-summary, other]
                title: { type: string, maxLength: 500 }
                content: { type: string, maxLength: 100000 }
                contentType: { type: string, default: 'text/plain' }
                docStatus: { type: string, enum: [preliminary, final, amended] }
